# Clears a Cloudflare zone or specific paths in a zone
#
# This workflow requires an environment named "cloudflare" or repo settings
# with the following:
#   vars:CLOUDFLARE_ZONE
#   vars:CLOUDFLARE_ACCOUNT_ID
#   secret:CLOUDFLARE_TOKEN (can also be passed)

name: Clear Cloudflare Cache
on:
  workflow_call:
    secrets:
      CLOUDFLARE_TOKEN:
        description: "A cloudflare token with the ability to clear cache on the given zone"
    inputs:
      paths:
        type: string
        description: "If there are specific URLS to be cleared, this should be a multi-line input. If zone should be cleared, leave blank"
        default: ""

# This action doesn't need any additional permissions
permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: "cloudflare_cache"
  cancel-in-progress: true

jobs:
  clear_cache:
    name: Run
    runs-on: ubuntu-latest
    environment: cloudflare
    steps:
      - name: Clearing Entire Zone
        if: ${{ inputs.paths == '' }}
        run: echo true
      - name: Clearing Individual Paths
        if: ${{ inputs.paths != '' }}
        run: echo true
      - name: Clear
        uses: Cyb3r-Jak3/action-cloudflare-cache@6ebf798ade84e7ab7da249404e0c3b9aecf54f88
        with:
          zone: ${{ vars.CLOUDFLARE_ZONE }}
          api_token: ${{ secrets.CLOUDFLARE_TOKEN }}
          account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          URLs: ${{ inputs.paths }}