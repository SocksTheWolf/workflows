# This workflow requires an environment named "tangled"
# that has a variable named "MIRROR_REPO" that has
# the repository path of your project
name: Tangled Mirror

on:
  workflow_call:
    secrets:
      KEY:
        description: "The SHA key for your tangled repo"

permissions:
  contents: read
  deployments: write

concurrency:
  group: tangled
  cancel-in-progress: false

jobs:
  clean_deployments:
    uses: ./.github/workflows/clean_deploys.yml
    with:
      environment: tangled

  push_tangled:
    name: Update
    # Wait for the clean deploys to finish
    needs: clean_deployments
    runs-on: ubuntu-latest
    environment: tangled
    steps:
      - name: Push to Tangled
        uses: gwennlbh/to-tangled@50f70a6910307e6fffa632e6d7cfec6b9e9f94ec
        with:
          repo: ${{ vars.MIRROR_REPO }}
          ssh-key: ${{ secrets.KEY }}